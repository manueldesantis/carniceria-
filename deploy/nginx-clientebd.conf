# Ejemplo nginx: https://cliente.tudominio.com → ClienteBD en 127.0.0.1:3080
server {
    listen 80;
    server_name cliente.tudominio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cliente.tudominio.com;

    # ssl_certificate     /etc/letsencrypt/live/cliente.tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cliente.tudominio.com/privkey.pem;

    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
